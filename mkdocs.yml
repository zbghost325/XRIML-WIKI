site_name: XRIML Wiki
site_description: XR Immersive Media Lab Documentation
site_author: CAMD - Northeastern University
site_url: https://zbghost325.github.io/XRIML-WIKI/

theme:
  name: material
  logo: images/logo-test.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link

nav:
  - Home: index.md
  - Resource Guide:
      - Overview: equipment/overview.md
      - VR Headsets: equipment/vr-headsets.md
      - AR Headsets: equipment/ar-headsets.md
      - MR Headsets: equipment/mr-headsets.md
      - XR Accessories: equipment/xr-accessories.md
      - 360 Cameras: equipment/360-cameras.md
      - 360 Accessories: equipment/360-accessories.md
      - Motion Capture: equipment/motion-capture.md
      - Volumetric Video Capture: equipment/volumetric-capture.md
      - Computers: equipment/workstations.md
      - Displays: equipment/displays.md
      - Software: equipment/software.md
      - Legacy: equipment/legacy.md
  - Policies:
      - Lab Rules: policies/lab-rules.md
      - Reservations: policies/reservations.md
      - Equipment Checkout: policies/equipment-checkout.md
  - Tags: tags.md

plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - meta

extra_css:
  - stylesheets/extra.css
