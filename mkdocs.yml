site_name: XRIML Wiki
site_description: XR Immersive Media Lab Documentation
site_author: CAMD - Northeastern University
site_url: https://zbghost325.github.io/XRIML-WIKI/

theme:
  name: material
  logo: images/logo-test.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link

nav:
  - Home: index.md
  - Policies:
      - Lab Rules: policies/lab-rules.md
      - Reservations: policies/reservations.md
      - Equipment Checkout: policies/equipment-checkout.md
  - Tags: tags.md

plugins:
  - search
  - tags:
      tags_file: tags.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - toc:
      permalink: true
  - meta

extra_css:
  - stylesheets/extra.css
